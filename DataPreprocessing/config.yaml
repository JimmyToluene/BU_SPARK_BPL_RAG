# ── Output Paths ───────────────────────────────────────────────
# Folder structure:
#   bpl_clean_dataset/{Title}_{Collection}/
#     bpl_ids.json          <- Phase 1 IDs
#     {year}.json           <- Phase 2 data
#     temp/
#       bpl_checkpoint.json <- Phase 2 checkpoint
output:
  ids_file:         "bpl_ids.json"           # filename for Phase 1 IDs (per collection)
  checkpoint_file:  "bpl_checkpoint.json"    # filename for Phase 2 checkpoint (in temp/)
  dataset_file:     "bpl_clean_dataset.json" # stem used as root output folder name

# ── Performance ────────────────────────────────────────────────
performance:
  request_delay:    2    # seconds between metadata page fetches
  max_workers:      4      # parallel threads for text fetching
  checkpoint_every: 100    # save checkpoint every N records
  max_pages:        null   # set integer e.g. 2 to limit during testing

# ── Retry ─────────────────────────────────────────────────────
retry:
  max_retries:  5
  backoff:      [2, 5, 10, 30, 60]
